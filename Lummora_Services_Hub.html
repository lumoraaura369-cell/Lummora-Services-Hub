<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lummora Services Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@200;300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --p:#8459A0;--g:#06B155;--y:#FEBF00;--r:#F10603;--b:#03B0F2;--gold:#FAC112;
  --bg:#05050e;--surf:#0b0b1c;--card:#101025;--card2:#161633;
  --bdr:rgba(132,89,160,.18);--bdr2:rgba(132,89,160,.4);
  --txt:#dde0f8;--muted:#6a6a96;--dim:#30305a;
  --fw:'Audiowide',monospace;--fb:'Exo 2',sans-serif;
  --r8:8px;--r12:12px;--r16:16px;--r24:24px
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--fb);background:var(--bg);color:var(--txt)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 1000px 700px at -5% -5%,rgba(132,89,160,.08),transparent 55%),
  radial-gradient(ellipse 800px 600px at 105% 105%,rgba(6,177,85,.06),transparent 55%),
  radial-gradient(ellipse 600px 400px at 55% 40%,rgba(3,176,242,.04),transparent 60%)}
/* AUTH */
#authScr{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 16px}
.auth-logo{width:100%;max-width:700px;margin-bottom:24px}
.auth-logo svg{width:100%;height:auto;filter:drop-shadow(0 4px 30px rgba(132,89,160,.25))}
.auth-box{width:100%;max-width:420px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r24);padding:26px;box-shadow:0 30px 80px rgba(0,0,0,.55)}
.auth-tag{text-align:center;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:22px;font-family:var(--fw)}
.atabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--r8);padding:3px;margin-bottom:22px}
.atab{flex:1;padding:9px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.atab.on{background:var(--card2);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.aform{display:none}.aform.on{display:block}
.fg{margin-bottom:13px}
.flbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.4px}
input.fi,select.fi,textarea.fi{width:100%;padding:10px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r8);color:var(--txt);font-family:var(--fb);font-size:13px;outline:none;transition:border-color .2s}
input.fi:focus,select.fi:focus{border-color:var(--p)}
input.fi::placeholder{color:var(--dim)}
select.fi{cursor:pointer}select.fi option{background:var(--card)}
textarea.fi{resize:vertical;min-height:80px}
.btn{padding:11px 22px;border-radius:var(--r8);border:none;font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.btn-full{width:100%;justify-content:center}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:#9b6db8;box-shadow:0 4px 20px rgba(132,89,160,.35)}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:#09d365;box-shadow:0 4px 20px rgba(6,177,85,.35)}
.btn-b{background:transparent;color:var(--muted);border:1px solid var(--bdr)}.btn-b:hover{border-color:var(--p);color:var(--p)}
.btn-r{background:rgba(241,6,3,.1);color:var(--r);border:1px solid rgba(241,6,3,.2)}.btn-r:hover{background:rgba(241,6,3,.2)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.sep{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--dim);font-size:11px}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--bdr)}
.adm-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:14px}
.adm-hint span{color:var(--p);cursor:pointer;font-weight:700}.adm-hint span:hover{text-decoration:underline}
/* HUB */
#hubScr{display:none;position:relative;z-index:1;min-height:100vh;flex-direction:column}
#hubScr.vis{display:flex}
header{position:sticky;top:0;z-index:100;padding:0 28px;height:66px;display:flex;align-items:center;gap:14px;background:rgba(5,5,14,.9);backdrop-filter:blur(22px);border-bottom:1px solid var(--bdr);flex-shrink:0}
.hdr-logo{height:44px;flex-shrink:0}
.hdr-logo svg{height:44px;width:auto}
.hdr-div{width:1px;height:30px;background:var(--bdr);flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-t{font-family:var(--fw);font-size:15px;letter-spacing:1.5px;background:linear-gradient(120deg,var(--p),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-s{font-size:10px;color:var(--muted);margin-top:1px}
.hdr-usr{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--b));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;font-family:var(--fw);flex-shrink:0}
.hdr-name{font-weight:700;font-size:12px}
.hdr-role{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:.5px;margin-top:2px;display:inline-block}
.role-admin{background:rgba(132,89,160,.18);color:var(--p);border:1px solid var(--bdr2)}
.role-user{background:rgba(3,176,242,.12);color:var(--b);border:1px solid rgba(3,176,242,.25)}
.role-guest{background:rgba(250,193,18,.1);color:var(--gold);border:1px solid rgba(250,193,18,.2)}
.hbtn{width:36px;height:36px;border-radius:var(--r8);border:1px solid var(--bdr);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0;text-decoration:none}
.hbtn:hover{border-color:var(--p);color:var(--p)}
.hbtn.act{background:rgba(132,89,160,.15);border-color:var(--bdr2);color:var(--p)}
/* MAIN */
.hub-main{flex:1;padding:26px 28px 70px;max-width:1480px;margin:0 auto;width:100%}
.search-w{position:relative;margin-bottom:14px}
.search-w svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
input.srch{width:100%;padding:11px 13px 11px 42px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r12);color:var(--txt);font-family:var(--fb);font-size:14px;outline:none;transition:all .2s}
input.srch:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(132,89,160,.1)}
input.srch::placeholder{color:var(--muted)}
.ftabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px}
.ftab{padding:5px 13px;border-radius:30px;border:1px solid var(--bdr);background:transparent;color:var(--muted);font-family:var(--fb);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.ftab:hover{border-color:var(--p);color:var(--p)}
.ftab.on{background:var(--p);border-color:var(--p);color:#fff}
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-l{font-family:var(--fw);font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.sec-c{font-size:12px;color:var(--dim)}
/* GRID */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:15px}
.scard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r16);overflow:hidden;cursor:pointer;position:relative;transition:transform .3s,box-shadow .3s,border-color .3s;animation:cIn .4s ease both}
.scard::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent 50%);border-radius:inherit}
.scard:hover{background:var(--card2);border-color:var(--bdr2);transform:translateY(-4px);box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 30px rgba(132,89,160,.12)}
@keyframes cIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.c-acc{height:4px}.c-body{padding:17px}
.c-ico{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:11px}
.c-name{font-family:var(--fw);font-size:12px;letter-spacing:.6px;margin-bottom:5px;line-height:1.3}
.c-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-foot{display:flex;align-items:center;justify-content:space-between}
.c-cat{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;letter-spacing:.4px}
.c-launch{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;color:#fff}
.c-launch:hover{transform:scale(1.15);filter:brightness(1.2)}
.skel{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r16);padding:17px;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.75}}
.sk-bar{height:4px;border-radius:2px;background:var(--surf);margin-bottom:17px}
.sk-ico{width:46px;height:46px;border-radius:11px;background:var(--surf);margin-bottom:11px}
.sk-ln{height:11px;border-radius:3px;background:var(--surf);margin-bottom:8px}
.empty{text-align:center;padding:60px 20px;grid-column:1/-1}
.empty-i{font-size:50px;margin-bottom:15px;opacity:.2}
.empty-t{font-family:var(--fw);font-size:13px;color:var(--dim);margin-bottom:6px}
.empty-s{font-size:12px;color:var(--muted)}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);z-index:1000;display:none;align-items:center;justify-content:center}
.mbg.open{display:flex;animation:fi .2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.mwin{width:97vw;height:95vh;background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--r16);display:flex;flex-direction:column;overflow:hidden;animation:mu .25s cubic-bezier(.4,0,.2,1);box-shadow:0 50px 120px rgba(0,0,0,.9)}
@keyframes mu{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mbar{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid var(--bdr);background:var(--card);flex-shrink:0}
.m-ico{font-size:17px;width:26px;text-align:center}
.m-tit{font-family:var(--fw);font-size:12px;letter-spacing:.6px;flex:1}
.m-act{width:27px;height:27px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s}
.m-act:hover{border-color:var(--p);color:var(--p)}.m-act.cls:hover{border-color:var(--r);color:var(--r)}
.mfw{flex:1;position:relative;overflow:hidden}
.mfr{width:100%;height:100%;border:none;background:#fff;display:none}
.mld{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:var(--bg)}
.spin{width:38px;height:38px;border:3px solid var(--bdr);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ADMIN */
.aov{position:fixed;inset:0;background:rgba(0,0,0,.94);backdrop-filter:blur(16px);z-index:2000;display:none;overflow-y:auto}
.aov.open{display:block;animation:fi .2s ease}
.awrap{max-width:780px;margin:28px auto 60px;padding:0 14px}
.apanel{background:var(--surf);border:1px solid var(--bdr2);border-radius:var(--r24);overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.ahead{padding:20px 26px;background:linear-gradient(135deg,rgba(132,89,160,.1),rgba(3,176,242,.05));border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.atitle{font-family:var(--fw);font-size:17px;letter-spacing:2px;background:linear-gradient(120deg,var(--p),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.abadge{font-size:10px;padding:3px 10px;border-radius:20px;background:rgba(132,89,160,.15);color:var(--p);border:1px solid var(--bdr2);font-weight:700;letter-spacing:1px}
.atabs2{display:flex;border-bottom:1px solid var(--bdr);background:var(--card);overflow-x:auto}
.atab2{flex:1;min-width:80px;padding:12px 6px;border:none;background:transparent;color:var(--muted);font-family:var(--fb);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px;border-bottom:2px solid transparent;white-space:nowrap}
.atab2:hover{color:var(--txt)}
.atab2.on{color:var(--p);border-bottom-color:var(--p)}
.abody{padding:24px 26px}
.asec{margin-bottom:24px}
.asec-t{font-family:var(--fw);font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;padding-bottom:9px;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
/* File Drop */
.fdrop{border:2px dashed var(--bdr);border-radius:var(--r12);padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:9px}
.fdrop:hover,.fdrop.on{border-color:var(--p);background:rgba(132,89,160,.04)}
.fdrop-ico{font-size:32px;margin-bottom:9px}
.fdrop-txt{font-size:13px;color:var(--muted)}
.fdrop-hint{font-size:11px;color:var(--dim);margin-top:4px}
.fpreview{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.fp-item{display:flex;align-items:center;gap:9px;padding:7px 11px;background:rgba(6,177,85,.06);border:1px solid rgba(6,177,85,.18);border-radius:var(--r8)}
.fp-name{flex:1;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fp-sz{font-size:11px;color:var(--muted);flex-shrink:0}
.fp-rm{border:none;background:none;color:var(--r);cursor:pointer;font-size:14px;flex-shrink:0;padding:0 4px}
/* Swatches */
.swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.sw{width:27px;height:27px;border-radius:7px;cursor:pointer;border:3px solid transparent;transition:all .2s}
.sw.sel{border-color:#fff;transform:scale(1.2);box-shadow:0 0 8px rgba(255,255,255,.3)}
/* Progress */
.prog{display:none;margin-top:9px}
.prog-bar{height:3px;background:var(--card);border-radius:2px;overflow:hidden;margin-bottom:5px}
.prog-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--p),var(--b));width:0%;transition:width .3s ease}
.prog-t{font-size:11px;color:var(--muted)}
/* API Keys */
.api-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r12);padding:14px;margin-bottom:10px}
.api-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.api-logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.api-name{font-weight:700;font-size:13px}
.api-desc{font-size:11px;color:var(--muted);margin-top:1px}
.api-status{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:auto;flex-shrink:0}
.api-ok{background:rgba(6,177,85,.12);color:var(--g);border:1px solid rgba(6,177,85,.2)}
.api-no{background:rgba(106,106,150,.1);color:var(--muted);border:1px solid var(--bdr)}
.api-inp-wrap{position:relative}
.api-inp-wrap input{padding-right:80px}
.api-show{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--card2);border:1px solid var(--bdr);border-radius:5px;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;padding:3px 8px}
/* Service list */
.svc-list{display:flex;flex-direction:column;gap:7px}
.svc-item{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r8)}
.svc-item-ico{font-size:20px;width:30px;text-align:center;flex-shrink:0}
.svc-item-info{flex:1;min-width:0}
.svc-item-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.svc-item-meta{font-size:11px;color:var(--muted);margin-top:1px}
/* Users */
.user-list{display:flex;flex-direction:column;gap:7px}
.user-row{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r8)}
.u-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:var(--fw);color:#fff;flex-shrink:0}
.u-info{flex:1;min-width:0}
.u-name{font-size:13px;font-weight:700}
.u-email{font-size:11px;color:var(--muted)}
.badge{font-size:9px;padding:2px 7px;border-radius:12px;font-weight:700;letter-spacing:.5px}
.b-p{background:rgba(132,89,160,.15);color:var(--p)}
.b-b{background:rgba(3,176,242,.12);color:var(--b)}
.divider{height:1px;background:var(--bdr);margin:16px 0}
/* Toasts */
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 15px;border-radius:var(--r8);font-size:13px;min-width:230px;display:flex;align-items:center;gap:7px;animation:toastIn .3s ease;box-shadow:0 8px 28px rgba(0,0,0,.6)}
@keyframes toastIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.t-ok{background:#081510;border:1px solid var(--g);color:#4ade80}
.t-er{background:#150808;border:1px solid var(--r);color:#f87171}
.t-in{background:#08101a;border:1px solid var(--b);color:#60a5fa}
.t-wa{background:#15120a;border:1px solid var(--y);color:#fcd34d}
@media(max-width:640px){
  header{padding:0 12px}.hub-main{padding:14px 12px 60px}
  .frow{grid-template-columns:1fr}.awrap{padding:0 8px;margin:14px auto 40px}.abody{padding:16px 14px}.ahead{padding:14px 16px}
  .atab2{font-size:10px;padding:11px 4px}
  .mwin{width:100vw;height:100dvh;border-radius:0}
  .auth-logo{max-width:100%}
}
</style>
</head>
<body>

<!-- ═══ AUTH SCREEN ═══ -->
<div id="authScr">
  <div class="auth-logo">

<script>
// ══════════ CONSTANTS ══════════
const DEF_ADMIN = { user:'lummora_admin', pass:'Admin@Lummora2025' };
const PAL = ['#8459A0','#06B155','#03B0F2','#FEBF00','#F10603','#FAC112','#FF6B6B','#4ECDC4','#A78BFA','#34D399','#FB923C','#E879F9'];

// ══════════ STATE ══════════
let CU = null; // current user
let SVCS = [];
let CAT = 'All';
let BCACHE = new Map(); // blob cache
let PFILES = []; // pending files
let SCOLOR = '#8459A0';
let ATAB = 'upload';

// ══════════ INDEXEDDB ══════════
const IDB = {
  _db: null,
  async open() {
    if (this._db) return this._db;
    return new Promise((res, rej) => {
      const r = indexedDB.open('LummoraHub', 3);
      r.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('content')) db.createObjectStore('content', { keyPath: 'id' });
      };
      r.onsuccess = e => { this._db = e.target.result; res(this._db); };
      r.onerror = () => rej(r.error);
    });
  },
  async set(id, html) {
    const db = await this.open();
    return new Promise((res, rej) => {
      const tx = db.transaction('content', 'readwrite');
      tx.objectStore('content').put({ id, html });
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  },
  async get(id) {
    const db = await this.open();
    return new Promise((res, rej) => {
      const r = db.transaction('content', 'readonly').objectStore('content').get(id);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },
  async del(id) {
    const db = await this.open();
    return new Promise((res, rej) => {
      const tx = db.transaction('content', 'readwrite');
      tx.objectStore('content').delete(id);
      tx.oncomplete = res; tx.onerror = () => rej(tx.error);
    });
  }
};

// ══════════ API KEYS ══════════
const APIS = {
  groq:    { name:'Groq AI',      icon:'⚡', color:'#F55036', desc:'llama-3.3-70b-versatile — 14,400 req/day free', url:'https://console.groq.com', var:'GROQ_API_KEY' },
  gemini:  { name:'Google Gemini',icon:'🟦', color:'#4285F4', desc:'Gemini 1.5 Flash — free tier (outside India)', url:'https://aistudio.google.com', var:'GEMINI_API_KEY' },
  openai:  { name:'OpenAI',       icon:'🟢', color:'#10A37F', desc:'GPT-4o-mini — $5 free credit on signup', url:'https://platform.openai.com', var:'OPENAI_API_KEY' },
  claude:  { name:'Anthropic Claude', icon:'🟠', color:'#CC785C', desc:'Claude Haiku — $5 free credit on signup', url:'https://console.anthropic.com', var:'ANTHROPIC_API_KEY' },
  google:  { name:'Google AI / Search', icon:'🔍', color:'#EA4335', desc:'Custom Search, Maps, YouTube Data APIs', url:'https://console.cloud.google.com', var:'GOOGLE_API_KEY' },
};

function getKeys() {
  try { return JSON.parse(localStorage.getItem('lu_apikeys') || '{}'); }
  catch (_) { return {}; }
}
function saveKeys(obj) { localStorage.setItem('lu_apikeys', JSON.stringify(obj)); }

// Build key injection script to prepend into every loaded HTML
function buildKeyScript() {
  const keys = getKeys();
  const lines = Object.entries(APIS).map(([k, info]) =>
    `${info.var}: ${JSON.stringify(keys[k] || '')}`
  ).join(',\n    ');
  // Also expose as individual globals for convenience
  const globals = Object.entries(APIS).map(([k, info]) =>
    `window.${info.var} = ${JSON.stringify(keys[k] || '')};`
  ).join('\n  ');
  return `<script id="__lummora_keys__">
  window.LUMMORA_KEYS = {
    ${lines},
    // shortcuts
    groq: ${JSON.stringify(keys.groq || '')},
    gemini: ${JSON.stringify(keys.gemini || '')},
    openai: ${JSON.stringify(keys.openai || '')},
    claude: ${JSON.stringify(keys.claude || '')},
    google: ${JSON.stringify(keys.google || '')}
  };
  ${globals}
<\/script>`;
}

// Inject keys into HTML content
function injectKeys(html) {
  const script = buildKeyScript();
  // Try to inject right after <head> or <html> or at very beginning
  if (html.includes('<head>')) return html.replace('<head>', '<head>' + script);
  if (html.includes('<head ')) return html.replace(/<head([^>]*)>/, '<head$1>' + script);
  if (html.includes('<html')) return html.replace(/<html([^>]*)>/, '<html$1>' + script);
  return script + html; // fallback: prepend
}

// ══════════ AUTH ══════════
function getAdm() { return { user: localStorage.getItem('lu_admU') || DEF_ADMIN.user, pass: localStorage.getItem('lu_admP') || DEF_ADMIN.pass }; }
function getUsers() { try { return JSON.parse(localStorage.getItem('lu_users') || '[]'); } catch (_) { return []; } }
function saveUsers(u) { localStorage.setItem('lu_users', JSON.stringify(u)); }

function authTab(t) {
  document.querySelectorAll('.atab').forEach((el, i) => el.classList.toggle('on', (i===0&&t==='login')||(i===1&&t==='reg')));
  document.getElementById('af-login').classList.toggle('on', t === 'login');
  document.getElementById('af-reg').classList.toggle('on', t === 'reg');
}

function doLogin() {
  const u = document.getElementById('li-u').value.trim();
  const p = document.getElementById('li-p').value;
  if (!u || !p) { toast('Enter username & password', 'er'); return; }
  const adm = getAdm();
  if (u === adm.user && p === adm.pass) {
    CU = { username: u, name: 'Admin', role: 'admin' };
    enterHub();
    return;
  }
  const found = getUsers().find(x => x.username === u && x.password === p);
  if (!found) { toast('Wrong username or password', 'er'); return; }
  CU = { ...found, role: 'user' };
  enterHub();
}

function doReg() {
  const n = document.getElementById('rg-n').value.trim();
  const u = document.getElementById('rg-u').value.trim();
  const p = document.getElementById('rg-p').value;
  const e = document.getElementById('rg-e').value.trim();
  if (!n || !u || !p) { toast('Fill required fields', 'er'); return; }
  if (p.length < 6) { toast('Password: min 6 characters', 'wa'); return; }
  const adm = getAdm();
  if (u === adm.user) { toast('Username not available', 'er'); return; }
  const users = getUsers();
  if (users.find(x => x.username === u)) { toast('Username already taken', 'er'); return; }

// ══════════ FIREBASE CONTENT ══════════
async function saveContentToFirebase(id, html) {
  if (!fbDb) return;
  try {
    if (html.length < 900000) {
      await fbDb.collection('hub_content').doc(id).set({ html, ts: Date.now() });
    } else {
      const chunkSize = 800000;
      const chunks = [];
      for (let i = 0; i < html.length; i += chunkSize) { chunks.push(html.slice(i, i + chunkSize)); }
      const batch = fbDb.batch();
      chunks.forEach((chunk, idx) => { batch.set(fbDb.collection('hub_content').doc(id + '_chunk_' + idx), { chunk, idx, total: chunks.length, parentId: id }); });
      batch.set(fbDb.collection('hub_content').doc(id), { chunked: true, total: chunks.length, ts: Date.now() });
      await batch.commit();
    }
  } catch(e) { console.warn('Firebase content save failed:', e.message); }
}

async function loadContentFromFirebase(id) {
  if (!fbDb) return null;
  try {
    const snap = await fbDb.collection('hub_content').doc(id).get();
    if (!snap.exists) return null;
    const data = snap.data();
    if (data.html) return data.html;
    if (data.chunked) {
      const chunks = [];
      for (let i = 0; i < data.total; i++) {
        const cSnap = await fbDb.collection('hub_content').doc(id + '_chunk_' + i).get();
        if (cSnap.exists) chunks.push(cSnap.data().chunk);
      }
      return chunks.join('');
    }
    return null;
  } catch(e) { console.warn('Firebase content load failed:', e.message); return null; }
}

async function deleteContentFromFirebase(id) {
  if (!fbDb) return;
  try {
    const snap = await fbDb.collection('hub_content').doc(id).get();
    if (snap.exists) {
      const data = snap.data();
      if (data.chunked) {
        const batch = fbDb.batch();
        for (let i = 0; i < data.total; i++) { batch.delete(fbDb.collection('hub_content').doc(id + '_chunk_' + i)); }
        batch.delete(fbDb.collection('hub_content').doc(id));
        await batch.commit();
      } else { await fbDb.collection('hub_content').doc(id).delete(); }
    }
  } catch(e) { console.warn('Firebase content delete failed:', e); }
}

async function loadServices() {
  showSkel();
  if (!fbDb) initFirebase();
  if (fbDb) {
    try {
      // Real-time listener — auto updates when admin adds service
      if (fbUnsubscribe) fbUnsubscribe();
      fbUnsubscribe = fbDb.collection('hub').doc('services').onSnapshot(snap => {
        if (snap.exists) {
          const data = snap.data();
          SVCS = data.list || [];
          saveSvcIdxLocal(SVCS); // keep local backup
        } else {
          // First time — load from localStorage if available
          const d = getSvcIdx();
          SVCS = d.services || [];
        }
        renderGrid();
        renderTabs();
        warmCache();
      }, err => {
        console.warn('Firestore listener error, using local', err);
        const d = getSvcIdx();
        SVCS = d.services || [];
        renderGrid(); renderTabs(); warmCache();
      });
      return;
    } catch(e) {
      console.warn('Firestore load failed, using local', e);
    }
  }
  // Fallback to localStorage
  const d = getSvcIdx();
  SVCS = d.services || [];
  renderGrid(); renderTabs(); warmCache();
}

// ══════════ MIGRATION ══════════
async function migrateToFirebase() {
  const d = getSvcIdx();
  const localSvcs = d.services || [];
  if (!localSvcs.length) { toast('No local services to migrate', 'wa'); return; }
  if (!fbDb) { toast('Firebase not connected', 'er'); return; }
  try {
    toast('Migrating ' + localSvcs.length + ' services to cloud…', 'in');
    await fbDb.collection('hub').doc('services').set({ list: localSvcs, ts: Date.now() });
    SVCS = localSvcs;
    toast('✅ ' + localSvcs.length + ' services migrated to Firebase!', 'ok');
    renderGrid(); renderTabs();
  } catch(e) {
    toast('Migration failed: ' + e.message, 'er');
  }
}

async function warmCache() {
  for (const s of SVCS) {
    if (s.type !== 'url' && !BCACHE.has(s.id)) {
      try {
        const rec = await IDB.get(s.id);
        if (rec && rec.html) {
          const injected = injectKeys(rec.html);
          const b = new Blob([injected], { type: 'text/html' });
          BCACHE.set(s.id, URL.createObjectURL(b));
        }
      } catch (_) {}
    }
  }
}

// Invalidate cache when keys change so new keys are injected
function invalidateCache() {
  BCACHE.forEach(url => URL.revokeObjectURL(url));
  BCACHE.clear();
  warmCache();
}

// ══════════ LAUNCH ══════════
async function launch(id) {
  const svc = SVCS.find(s => s.id === id);
  if (!svc) return;
  document.getElementById('mIco').textContent = svc.icon || '📦';
  document.getElementById('mTit').textContent = svc.name;
  const modal = document.getElementById('svcModal');
  const frame = document.getElementById('svcFr');
  const loader = document.getElementById('mLoad');
  modal.classList.add('open');
  frame.style.display = 'none';
  loader.style.display = 'flex';
  loader.innerHTML = '<div class="spin"></div><div style="font-size:12px;color:var(--muted)">Opening service…</div>';

  try {
    if (svc.type === 'url') {
      frame.onload = () => { loader.style.display = 'none'; frame.style.display = 'block'; };
      frame.src = svc.url;
      return;
    }
    // File type — use cache if available
    if (BCACHE.has(id)) {
      frame.src = BCACHE.get(id);
      frame.onload = () => { loader.style.display = 'none'; frame.style.display = 'block'; };
      return;
    }
    // Pehle local IndexedDB check karo
    let htmlContent = null;
    const rec = await IDB.get(id);
    if (rec && rec.html) { htmlContent = rec.html; }

    // Local mein nahi mila toh Firebase se load karo
    if (!htmlContent) {
      loader.innerHTML = '<div class="spin"></div><div style="font-size:12px;color:var(--muted)">Loading from cloud…</div>';
      htmlContent = await loadContentFromFirebase(id);
      if (htmlContent) {
        await IDB.set(id, htmlContent);
        toast('Service loaded from cloud ✅', 'ok');
      }
    }
    if (!htmlContent) throw new Error('Service file not found in storage');
    const injected = injectKeys(htmlContent);
    const blob = new Blob([injected], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    BCACHE.set(id, url);
    frame.onload = () => { loader.style.display = 'none'; frame.style.display = 'block'; };
    frame.src = url;
  } catch (e) {
    loader.innerHTML = `<div style="text-align:center"><div style="font-size:36px;margin-bottom:10px">⚠️</div><div style="color:var(--r);margin-bottom:6px">${esc(e.message)}</div><div style="font-size:11px;color:var(--muted)">Make sure the service file was saved correctly</div></div>`;
  }
}

    <div class="asec-t">Danger Zone</div>
    <button class="btn btn-r" onclick="clearAll()">🗑 Clear All Services & Data</button>
  </div>`;
}

// ══════════ API KEY ACTIONS ══════════
function toggleKeyVis(k) {
  const inp = document.getElementById('akey-' + k);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function updateKeyStatus(k) {
  const val = document.getElementById('akey-' + k).value;
  const el = document.getElementById('aps-' + k);
  if (!el) return;
  el.textContent = val.length > 6 ? '✓ SET' : 'NOT SET';
  el.className = 'api-status ' + (val.length > 6 ? 'api-ok' : 'api-no');
}
function saveKey(k) {
  const val = document.getElementById('akey-' + k).value.trim();
  const keys = getKeys(); keys[k] = val; saveKeys(keys);
  updateKeyStatus(k);
  invalidateCache();
  toast((val ? '✅ ' : '🗑 ') + APIS[k].name + ' key ' + (val ? 'saved' : 'cleared'), 'ok');
}
function clearKey(k) {
  const keys = getKeys(); delete keys[k]; saveKeys(keys);
  const el = document.getElementById('akey-' + k); if (el) el.value = '';
  updateKeyStatus(k);
  invalidateCache();
  renderATab();
}
function saveAllKeys() {
  const keys = getKeys();
  Object.keys(APIS).forEach(k => {
    const el = document.getElementById('akey-' + k);
    if (el) keys[k] = el.value.trim();
  });
  saveKeys(keys);
  invalidateCache();
  toast('All API keys saved! Services updated.', 'ok');
  renderATab();
}

// ══════════ UPLOAD ══════════
function pickColor(c) { SCOLOR = c; document.querySelectorAll('.swatches .sw').forEach(s => s.classList.toggle('sel', s.dataset.c === c)); }

function toggleType() {
  const t = document.getElementById('sTy').value;
  document.getElementById('fileArea').style.display = t === 'file' ? 'block' : 'none';
  document.getElementById('urlArea').style.display = t === 'url' ? 'block' : 'none';
}

function bindDrop() {
  const drop = document.getElementById('fdrop');
  if (!drop) return;
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('on'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('on'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('on');
    handleFiles([...e.dataTransfer.files].filter(f => f.name.match(/\.html?$/i)));
  });
}

function onFileSelect(inp) { handleFiles([...inp.files]); inp.value = ''; }

function handleFiles(files) {
  files.forEach(f => {
    if (PFILES.find(p => p.name === f.name)) return;
    const rd = new FileReader();
    rd.onload = e => { PFILES.push({ name: f.name, size: f.size, content: e.target.result }); refreshFP(); };
    rd.readAsText(f);
  });
}

function refreshFP() {
  const el = document.getElementById('fpreview');
  if (!el) return;
  el.innerHTML = PFILES.map((f, i) =>
    `<div class="fp-item"><span>📄</span><span class="fp-name">${esc(f.name)}</span><span class="fp-sz">${fmtBytes(f.size)}</span><button class="fp-rm" onclick="rmPF(${i})">✕</button></div>`
  ).join('');
  document.getElementById('fdrop').querySelector('.fdrop-ico').textContent = PFILES.length ? '✅' : '📁';
}

function rmPF(i) { PFILES.splice(i, 1); refreshFP(); }

async function doUpload() {
  const name = document.getElementById('sNm').value.trim();
  const cat = document.getElementById('sCt').value.trim() || 'General';
  const desc = document.getElementById('sDc').value.trim();
  const icon = document.getElementById('sIc').value.trim() || '📦';
  const type = document.getElementById('sTy').value;
  if (!name) { toast('Enter a service name', 'er'); return; }
  const btn = document.getElementById('upBtn');
  btn.disabled = true;
  setP(true, 5, 'Preparing…');
  try {
    if (type === 'url') {
      const url = document.getElementById('sUrl').value.trim();
      if (!url) { toast('Enter URL', 'er'); btn.disabled = false; setP(false); return; }
      SVCS.push({ id: 'svc_' + Date.now(), name, category: cat, description: desc, icon, color: SCOLOR, type: 'url', url });
      setP(true, 80, 'Saving…');
    } else {
      if (!PFILES.length) { toast('Select an HTML file', 'er'); btn.disabled = false; setP(false); return; }
      const files = [...PFILES]; PFILES = [];
      for (let i = 0; i < files.length; i++) {
        setP(true, 15 + Math.floor((i / files.length) * 70), `Saving "${files[i].name}"…`);
        const id = 'svc_' + Date.now() + '_' + i;
        await IDB.set(id, files[i].content);
        // Firebase mein bhi save karo — sabhi devices pe dikhega
        await saveContentToFirebase(id, files[i].content);
        // Pre-warm blob cache with keys injected
        const injected = injectKeys(files[i].content);
        const blob = new Blob([injected], { type: 'text/html' });
        BCACHE.set(id, URL.createObjectURL(blob));
        SVCS.push({ id, name: files.length === 1 ? name : files[i].name.replace(/\.html?$/i, ''), category: cat, description: desc, icon, color: SCOLOR, type: 'file', filename: files[i].name });
      }
      setP(true, 90, 'Saving index…');
    }
    await saveSvcIdx(SVCS);
    setP(true, 100, 'Done!');
    setTimeout(() => {
      setP(false); btn.disabled = false;
      toast('"' + name + '" added successfully!', 'ok');
      renderGrid(); renderTabs();
      ['sNm','sCt','sDc','sIc'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      refreshFP();
      if (ATAB === 'upload') renderATab();
    }, 400);
  } catch (e) {
    toast('Error: ' + e.message, 'er');
    console.error(e);
    btn.disabled = false; setP(false);
  }
}

// ══════════ ADMIN ACTIONS ══════════
async function delSvc(id) {
  if (!confirm('Delete this service?')) return;
  SVCS = SVCS.filter(s => s.id !== id);
  await IDB.del(id);
  await deleteContentFromFirebase(id);
  if (BCACHE.has(id)) { URL.revokeObjectURL(BCACHE.get(id)); BCACHE.delete(id); }
  await saveSvcIdx(SVCS);
  renderGrid(); renderTabs(); renderATab();
  toast('Service deleted', 'in');
}

function delUser(un) {
  if (!confirm('Remove user ' + un + '?')) return;
  saveUsers(getUsers().filter(u => u.username !== un));
  renderATab();
  toast('User removed', 'in');
}

function saveAdmCreds() {
  const u = document.getElementById('nAdmU').value.trim();
  const p = document.getElementById('nAdmP').value;
  const c = document.getElementById('cAdmP').value;
  if (!u) { toast('Enter username', 'er'); return; }
  if (p && p.length < 6) { toast('Password min 6 characters', 'wa'); return; }
  if (p && p !== c) { toast('Passwords do not match', 'er'); return; }
  localStorage.setItem('lu_admU', u);
  if (p) localStorage.setItem('lu_admP', p);
  toast('Credentials saved! Logging out…', 'ok');
  setTimeout(doLogout, 1500);
}

async function clearAll() {
  if (!confirm('Delete ALL services? Cannot be undone.')) return;
  SVCS = []; BCACHE.forEach(u => URL.revokeObjectURL(u)); BCACHE.clear();
  localStorage.removeItem('lu_svcIdx');
  const db = await IDB.open();
  await new Promise(r => { const tx = db.transaction('content', 'readwrite'); tx.objectStore('content').clear(); tx.oncomplete = r; });
  renderGrid(); renderTabs(); renderATab();
  toast('All data cleared', 'wa');
}

// ══════════ HELPERS ══════════
function setP(show, pct, txt) {
  const el = document.getElementById('upProg'); if (!el) return;
  el.style.display = show ? 'block' : 'none';
  if (show) { document.getElementById('upF').style.width = pct + '%'; document.getElementById('upT').textContent = txt; }
}
function fmtBytes(b) { return b < 1024 ? b + 'B' : b < 1048576 ? (b/1024).toFixed(1)+'KB' : b < 1073741824 ? (b/1048576).toFixed(1)+'MB' : (b/1073741824).toFixed(2)+'GB'; }
function toast(msg, type = 'in') {
  const el = document.createElement('div');
  el.className = 'toast t-' + type;
  el.innerHTML = { ok:'✅', er:'❌', in:'ℹ️', wa:'⚠️' }[type] + ' ' + msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4500);
}
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeAdm(); }
  if (e.key === 'Enter' && document.getElementById('authScr').style.display !== 'none' && document.getElementById('af-login').classList.contains('on')) doLogin();
});
window.LUMMORA_HUB = { getServices: () => SVCS, getKeys, v: '3.1', brand: 'LUMMORA ENGINEERING PROJECTS PRIVATE LIMITED' };
</script>
